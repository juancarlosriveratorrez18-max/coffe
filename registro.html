<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Coffee – Registro</title>
    <link rel="stylesheet" href="./css/login.css" />
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Poppins:wght@300;400;700&family=Ribeye&display=swap" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/bdc4e23805.js" crossorigin="anonymous"></script>
    <style>
        /* Estilos específicos para organizar los campos en filas */
        .row { display: flex; gap: 15px; width: 100%; }
        .row .form-group { flex: 1; }
        .login-card { max-width: 480px; } /* Un poco más ancho para el formulario de registro */
        @media (max-width: 480px) { .row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <a href="index.html" class="nav-logo">
                <span class="logo-emoji">☕</span>
                <span class="nav-text">Coffee</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="menu.html" class="nav-link">Menu</a></li>
                <li><a href="galeria.html" class="nav-link">Galería</a></li>
                <li><a href="contacto.html" class="nav-link">Contáctenos</a></li>
            </ul>
            <div class="nav-icons">
                <div class="carrito" onclick="window.location.href='carrito.html'">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="contador">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="main">
        <div class="login-card">
            <div class="avatar-icon">
                <i class="fas fa-user-plus" style="font-size: 28px; color: white;"></i>
            </div>

            <h1 class="card-title">¡Únete a Coffee!</h1>
            <p class="card-subtitle">Crea tu cuenta y disfruta de café exclusivo</p>

            <form class="login-form">
                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Número de Identificación</label>
                    <input type="text" placeholder="Ej: 1077860619" required />
                </div>

                <div class="row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nombre</label>
                        <input type="text" placeholder="Ej: Juan" required />
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user-tag"></i> Apellido</label>
                        <input type="text" placeholder="Ej: Pérez" required />
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Edad</label>
                    <input type="number" placeholder="Ej: 25" required />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                    <input type="email" placeholder="ejemplo@correo.com" required />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Teléfono</label>
                    <input type="tel" placeholder="3212449101" required />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" placeholder="Mínimo 6 caracteres" required />
                </div>

                <div class="form-group">
                    <label><i class="fas fa-shield-alt"></i> Confirmar Contraseña</label>
                    <input type="password" placeholder="........" required />
                </div>

                <label class="remember-label" style="font-size: 11px; text-align: left; display: block; margin-top: 10px;">
                    <input type="checkbox" required /> Acepto los <a href="#" style="color: var(--accent);">términos y condiciones</a>
                </label>

                <button type="submit" class="btn-login">Registrarme</button>

                <p class="register-prompt">
                    ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
                    
                </p>
            </form>
        </div>
    </main>

</body>
</html>
